services:
  - type: web
    name: stock-news-web
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false

  - type: cron
    name: stock-news-ingest-cron
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    schedule: "*/5 * * * *"
    plan: starter
    startCommand: curl -fsS -X POST "$BASE_URL/v1/ingest/run?trigger_type=scheduled"
    envVars:
      - key: BASE_URL
        sync: false
